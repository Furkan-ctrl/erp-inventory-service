server:
  port: ${INVENTORY_PORT:8082}

spring:
  application:
    name: inventory-service

  datasource:
    url: ${INVENTORY_DB_URL:jdbc:postgresql://localhost:5432/inventory_db}
    username: postgres
    password: 2007
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:./data/uploads}

logging:
  level:
    com.erp.inventory: DEBUG